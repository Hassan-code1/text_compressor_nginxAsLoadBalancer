worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Define the upstream backend servers for load balancing
    upstream backend_servers {
        # By default, Nginx uses Round Robin load balancing.
        # You can change these to your actual backend URLs or IPs.
        # For local testing:
        # server host.docker.internal:3001;
        # server host.docker.internal:3002;
        
        # Example deployed servers:
        server backend1.yourdomain.com;
        server backend2.yourdomain.com;
    }

    server {
        listen 80;
        server_name localhost;

        # Increase max body size if you are uploading large files for compression
        client_max_body_size 50M;

        location / {
            proxy_pass http://backend_servers;
            
            # Pass important headers to the backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optional: Timeout settings for long-running compression tasks
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
